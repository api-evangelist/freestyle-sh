    BuildRecord:
      type: object
      description: 'One row in the `builds` table — a long-running snapshot creation task.


        Builds do not form trees. Sub-work (Docker pulls, systemd installs,

        per-layer captures of a multi-layer spec) is captured via append-only

        `build_phases` rows on this build, not via child builds. Builds related

        to one user request (e.g. retries that produce a fresh build for the

        same template) share a `request_id` — that''s the only correlation

        mechanism between builds.


        Build outputs are recorded on the artifact, not the build:

        `vm_snapshots.build_id` is the only link.'
      required:
      - buildId
      - accountId
      - state
      - plannedPhases
      - startedAt
      - updatedAt
      properties:
        buildId:
          $ref: '#/components/schemas/BuildId'
        accountId:
          $ref: '#/components/schemas/AccountId'
        requestId:
          oneOf:
