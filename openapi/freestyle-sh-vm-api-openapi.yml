components:
  schemas:
    CreateVmResponse:
      type: object
      required:
      - id
      - domains
      properties:
        id:
          type: string
        domains:
          type: array
          items:
            type: string
        consoleUrl:
          type:
          - string
          - 'null'
          description: '**Deprecated:** this field is scheduled for removal and is no longer

            populated. The default `{vm_id}.style.dev` hostname still resolves via

            firecracker''s host registry; consumers should construct it themselves

            if needed.'
          deprecated: true
        snapshotId:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SnapshotId'
            description: Debugging tool, if you believe its base is incorrect you can go off it.
    GitRepositorySpec:
      type: object
      required:
      - repo
      - path
      properties:
        repo:
          type: string
          description: url or id of the git repository
        path:
          type: string
          description: path to place the repo on
        rev:
          type:
          - string
          - 'null'
          description: optional rev (branch, tag, commit)
    KillVmResponse:
      type: object
      required:
      - id
      properties:
        id:
          $ref: '#/components/schemas/VmId'
    VmDeleteEvent:
      type: string
      enum:
      - OnStop
      - OnSuspend
    BatchServiceOperationResult:
      type: object
      required:
      - serviceId
      - success
      - message
      properties:
        serviceId:
          type: string
        success:
          type: boolean
        message:
          type: string
    VmInfo:
      type: object
      required:
      - id
      - state
      properties:
        id:
          $ref: '#/components/schemas/VmId'
        name:
          type:
          - string
          - 'null'
        state:
          $ref: '#/components/schemas/VMState'
        metrics:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/VmMetricsInfo'
        createdAt:
          type:
          - string
          - 'null'
          format: date-time
        lastNetworkActivity:
          type:
          - string
          - 'null'
          format: date-time
        cpuTimeSeconds:
          type:
          - number
          - 'null'
          format: double
        persistence:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/VmPersistence'
        snapshotId:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SnapshotId'
            description: The snapshot this VM was created from, if any.
        deleted:
          type: boolean
        createdDeclaratively:
          type: boolean
        buildId:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/BuildId'
            description: Build that produced this VM, if it was created via a build saga.
    SystemdRestartPolicyKind:
      type: string
      enum:
      - 'no'
      - on-failure
      - always
      - on-abnormal
    GetVmResponse:
      type: object
      required:
      - id
      - state
      properties:
        id:
          $ref: '#/components/schemas/VmId'
        name:
          type:
          - string
          - 'null'
        vmInstanceId:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/VmInstanceId'
            description: Unique ID for the current VM run (new ID generated on each start/resume)
        lastNetworkActivity:
          type:
          - string
          - 'null'
          format: date-time
        state:
          $ref: '#/components/schemas/VMState'
        cpuTimeSeconds:
          type:
          - number
          - 'null'
          format: double
        buildId:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/BuildId'
            description: Build that produced this VM, if it was created via a build saga.
    BuildState:
      type: string
      description: Lifecycle state of a build row.
      enum:
      - pending
      - running
      - succeeded
      - failed
    TerminalListResponse:
      type: object
      required:
      - terminals
      properties:
        terminals:
          type: array
          items:
            $ref: '#/components/schemas/TerminalSession'
    ResizeVmRequest:
      type: object
      properties:
        rootfsSizeGb:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        memSizeGb:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        vcpuCount:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
    SystemdUnitSpecPatch:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Unique slug; becomes unit name "<name>.service".
        mode:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SystemdUnitMode'
            description: '"oneshot" (run and exit) or "service" (long-running/healing).'
        exec:
          type:
          - array
          - 'null'
          items:
            type: string
          description: Executable to run (can specify multiple commands that run sequentially).
        env:
          type:
          - object
          - 'null'
          description: Environment variables.
          additionalProperties:
            type: string
          propertyNames:
            type: string
        user:
          type:
          - string
          - 'null'
          description: Linux user to run the service as.
        group:
          type:
          - string
          - 'null'
          description: Linux group to run the service in.
        workdir:
          type:
          - string
          - 'null'
          description: Working directory.
        after:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Establishes an ordering dependency. The current unit will start only

            after the units listed in After= have started. This is useful for

            ensuring that certain services are up and running before the current

            service begins its operation.'
        requires:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Establishes a strong dependency. If the required unit fails to

            start or stops unexpectedly, the current unit will also be stopped. This

            ensures that a service critical to the functioning of the current unit

            is running and stable. Units listed in Requires= are activated along

            with the current unit. If the required unit is not active, systemd will

            attempt to start it. This directive signifies a tight coupling between

            services, where the current service cannot function without the required

            service.'
        onFailure:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Units to activate when this unit enters a failed state. This is useful

            for triggering recovery actions, notifications, or cleanup services when

            the current service fails.'
        wantedBy:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Target used when enabling (default: multi-user.target).'
        enable:
          type:
          - boolean
          - 'null'
          description: 'Whether to enable this service (calls `systemctl enable <service>`).

            When enabled, the service will start automatically at boot.'
        timeoutSec:
          type:
          - integer
          - 'null'
          format: int64
          description: Overall start/stop timeout.
          minimum: 0
        deleteAfterSuccess:
          type:
          - boolean
          - 'null'
          description: 'For oneshot: remove unit on success.'
        readySignal:
          type:
          - boolean
          - 'null'
          description: Use sd_notify; maps to Type=notify.
        watchdogSec:
          type:
          - integer
          - 'null'
          format: int64
          description: Enable systemd watchdog (seconds).
          minimum: 0
        restartPolicy:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SystemdRestartPolicy'
            description: Restart semantics (service mode).
    GitOptions:
      type: object
      required:
      - config
      properties:
        config:
          $ref: '#/components/schemas/GitConfig'
        repos:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/GitRepositorySpec'
    ForkedVmResponse:
      type: object
      required:
      - id
      - domains
      properties:
        id:
          type: string
        domains:
          type: array
          items:
            type: string
        consoleUrl:
          type:
          - string
          - 'null'
    SystemdDeleteServiceResponse:
      type: object
      required:
      - success
      - message
      properties:
        success:
          type: boolean
        message:
          type: string
    StopVmResponse:
      type: object
      required:
      - vmId
      - vmInstanceId
      properties:
        vmId:
          $ref: '#/components/schemas/VmId'
        vmInstanceId:
          $ref: '#/components/schemas/VmInstanceId'
    SnapshotId:
      type: string
      description: 'Branded snapshot ID in the format `sc-<20 lowercase alphanumeric chars>`.

        Unlike `VmShortId`, this is a plain `String` wrapper with no fixed-size array or padding.'
    SystemdRestartPolicy:
      type: object
      required:
      - policy
      properties:
        policy:
          $ref: '#/components/schemas/SystemdRestartPolicyKind'
          description: '"no" | "on-failure" | "always" | "on-abnormal"'
        restartSec:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        startLimitBurst:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        startLimitIntervalSec:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
    WriteFileResponse:
      oneOf:
      - type: object
    FileSystemResponse:
      oneOf:
      - type: object
        required:
        - content
        properties:
          content:
            type: string
          encoding:
            $ref: '#/components/schemas/FileEncoding'
      - type: object
        required:
        - files
        properties:
          files:
            type: array
            items:
              $ref: '#/components/schemas/FileInfo'
    FreestyleFile:
      type: object
      required:
      - content
      properties:
        content:
          type: string
          description: The content of the file
        encoding:
          type: string
          description: The encoding of the file. Either **utf-8** or **base64**
        executable:
          type: boolean
          description: Whether the file should be marked executable after being written
    ResizeVmResponse:
      type: object
    OptimizeVmResponse:
      type: object
      required:
      - id
      - message
      properties:
        id:
          type: string
        message:
          type: string
    SnapshotPersistence:
      oneOf:
      - type: object
        description: 'When storage quota is reached, the least recently used snapshots will be

          deleted. Higher priority = less likely to be evicted. Range 0-10, default 5.'
        required:
        - type
        properties:
          priority:
            type:
            - integer
            - 'null'
            format: int32
            default: 5
            maximum: 10
