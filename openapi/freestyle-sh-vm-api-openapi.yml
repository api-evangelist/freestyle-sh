        additionalFiles:
          type:
          - object
          - 'null'
          additionalProperties:
            $ref: '#/components/schemas/FreestyleFile'
          propertyNames:
            type: string
        snapshotId:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SnapshotId'
            description: 'ID of a previously-created snapshot to boot directly as the VM''s base.

              This is distinct from `spec.snapshot.snapshotId`, which materializes a

              new cacheable snapshot layer based on that snapshot before creating the VM.'
        template:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/VmTemplate'
            description: 'Legacy single-layer VM template. Subsumed by the recursive

              `spec.snapshot` chain, which supports multiple cacheable layers.


              **Deprecated: use `spec.snapshot` instead.**'
        gitRepos:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/GitRepositorySpec'
          description: 'Legacy list of git repositories to clone into the VM at startup.


            **Deprecated: use `spec.git.repos` instead.**'
          deprecated: true
        git:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/GitOptions'
            description: Git configuration for the VM, including user settings and repositories to clone into the VM at startup.
        recreate:
          type:
          - boolean
          - 'null'
          description: 'If true, the VM can be recreated if it is deleted. The VM will keep the same ID

            and be recreated with the same configuration when something tries to start it.'
          default: false
        aptDeps:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Optional list of apt packages to install when setting up the VM.

            These packages will be installed using `apt-get install` on VM startup.'
          example:
          - git
          - curl
          - vim
        domains:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/VmDomainConfig'
          description: 'Optional list of custom domains to map to this VM. Each domain can optionally

            specify a vm port. If vm_port is not specified, defaults to 443.

            Domains must be verified and owned by the account before they can be mapped.'
          example:
          - domain: myapp.example.com
            vmPort: 3000
        activityThresholdBytes:
          type:
          - integer
          - 'null'
          format: int64
          description: 'Minimum bytes of network traffic per check interval to count as real

            activity for the idle timer.'
          minimum: 0
        dockerCredentials:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/DockerCredentials'
            description: 'Optional Docker registry credentials required when using a private

              image in the spec''s base image.'
    SnapshotVmRequest:
      type: object
      properties:
        name:
          type:
          - string
          - 'null'
          description: Optional name/label for the snapshot
        persistence:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SnapshotPersistence'
            description: Persistence strategy for the snapshot. Defaults to Sticky with priority 5.
    DockerCredentials:
      type: object
      required:
      - registry
      - username
      - password
      properties:
        registry:
          type: string
          description: Docker registry URL (e.g., "ghcr.io", "docker.io")
        username:
          type: string
          description: Username for the registry
        password:
          type: string
          description: Password or token for the registry
    ListBuildPhasesResponse:
      type: object
      description: 'Ordered timeline of phases for a single build.


        Phases are append-only; consumers wanting the "current phase" pick the

        last entry. Empty for a build whose top-level saga short-circuited

        (e.g. fully-cached chain) before any phase was recorded.'
      required:
      - phases
      properties:
        phases:
          type: array
          items:
            $ref: '#/components/schemas/BuildPhase'
    RequestId:
      type: string
      description: 'Branded request identifier — `ri-<20 lowercase alphanumeric chars>` for newly

        minted IDs. The wrapped string is otherwise opaque, so legacy UUID-formatted

        IDs (from in-flight requests during rollout) round-trip unchanged.'
    TerminalLogsArrayResponse:
      type: object
      required:
      - logs
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
    SystemdConfig:
      type: object
      properties:
        services:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/SystemdUnitSpec'
        patchedServices:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/SystemdUnitSpecPatch'
    DeleteSnapshotResponses:
      oneOf:
      - type: object
        required:
        - snapshot_id
        properties:
          snapshot_id:
            $ref: '#/components/schemas/SnapshotId'
    ListSnapshotsResponse:
      type: object
      required:
      - snapshots
      - totalCount
      - buildingCount
      - readyCount
      - failedCount
      - cancelledCount
      - lostCount
      - deletedCount
      properties:
        snapshots:
          type: array
          items:
            $ref: '#/components/schemas/SnapshotInfo'
        totalCount:
          type: integer
          minimum: 0
        buildingCount:
          type: integer
          minimum: 0
        readyCount:
          type: integer
          minimum: 0
        failedCount:
          type: integer
          minimum: 0
        cancelledCount:
          type: integer
          minimum: 0
        lostCount:
          type: integer
          minimum: 0
        deletedCount:
          type: integer
          minimum: 0
    BatchServiceRequest:
      type: object
      required:
      - services
      properties:
        services:
          type: array
          items:
            $ref: '#/components/schemas/ServiceIdItem'
    SnapshotStateTag:
      type: string
      description: "Lifecycle state of a snapshot row.\n\n  `Building`  — saga in flight, late-bound fields NULL.\n  `Ready`     — saga finalized cleanly; usable as a base.\n  `Failed`    — bytes complete but VM was broken at capture; bookable\n                for debugging.\n  `Cancelled` — saga rolled back / dependency failed; no bytes.\n  `Lost`      — reaper terminated a `building` row after a node\n                crash; bytes absent or partial."
      enum:
      - building
      - ready
      - failed
      - cancelled
      - lost
    GitUser:
      type: object
      properties:
        name:
          type:
          - string
          - 'null'
        email:
          type:
          - string
          - 'null'
        signingkey:
          type:
          - string
          - 'null'
    WriteFileRequest:
      type: object
      required:
      - content
      properties:
        content:
          type: string
        encoding:
          $ref: '#/components/schemas/FileEncoding'
    VmTemplate:
      type: object
      properties:
        snapshotId:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SnapshotId'
            description: 'Optional snapshot ID to create a VM from. If provided, the new VM will be

              created from the specified snapshot. Cannot be used together with fork_vm_id or docker_image.'
        baseImage:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/BaseImageSpec'
            description: 'Optional inline Dockerfile content to build and import a custom image from.

              Cannot be used together with snapshot_id.

              The image is built inside a temporary sandbox VM (no build context is used).'
        rootfsSizeGb:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        memSizeGb:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        vcpuCount:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        workdir:
          type:
          - string
          - 'null'
          description: Optional working directory for the VM. If not provided, the default to '/'
        idleTimeoutSeconds:
          type:
          - integer
          - 'null'
          format: int64
          description: 'Idle timeout in seconds. If set, the VM will be automatically suspended

            after this many seconds of no network activity. Defaults to 300 seconds

            (5 minutes) if not provided or the last used timeout for the forked VM.'
          minimum: 0
        waitForReadySignal:
          type:
          - boolean
          - 'null'
        readySignalTimeoutSeconds:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        persistence:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/VmPersistence'
            description: 'Persistence strategy for the VM. If not provided, defaults to ''sticky''

              with priority 5.'
        ports:
          type:
          - array
          - 'null'
          items:
            type: object
            required:
            - port
            - targetPort
            properties:
              port:
                type: integer
                format: int32
                minimum: 0
              targetPort:
                type: integer
                format: int32
                minimum: 0
          description: 'Optional list of ports to expose externally. If not provided, port 3000

            will be exposed on port 443 by default. Pass an empty array to disable

            external ports. Only ports 8081 and 443 can be configured externally for

            now. Any target port is allowed.'
          example:
          - port: 443
            targetPort: 3000
        systemd:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SystemdConfig'
        users:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/LinuxUserSpec'
          description: Linux users to create on VM startup
        groups:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/LinuxGroupSpec'
          description: Linux groups to create on VM startup
        additionalFiles:
          type:
          - object
          - 'null'
          additionalProperties:
            $ref: '#/components/schemas/FreestyleFile'
          propertyNames:
            type: string
        gitRepos:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/GitRepositorySpec'
          deprecated: true
        git:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/GitOptions'
            description: Repositories to clone and git options for the VM.
        discriminator:
          type:
          - string
          - 'null'
          description: Optional discriminator to differentiate snapshots with otherwise identical configurations
        aptDeps:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Optional list of apt packages to install when setting up the VM.

            These packages will be installed using `apt-get install` on VM startup.'
          example:
          - git
          - curl
          - vim
        skipCache:
          type:
          - boolean
          - 'null'
          description: 'When true, bypasses the snapshot cache and always creates a new snapshot.

            The new snapshot still stores the template hash, so it becomes the updated cache entry

            for future requests that do not set skip_cache.'
    SystemdUnitSpec:
      type: object
      required:
      - name
      - mode
      - exec
      properties:
        name:
          type: string
          description: Unique slug; becomes unit name "<name>.service".
        mode:
          $ref: '#/components/schemas/SystemdUnitMode'
          description: '"oneshot" (run and exit) or "service" (long-running/healing).'
        exec:
          type: array
          items:
            type: string
          description: Executable to run (can specify multiple commands that run sequentially).
        env:
          type:
          - object
          - 'null'
          description: Environment variables.
          additionalProperties:
            type: string
          propertyNames:
            type: string
        user:
          type:
          - string
          - 'null'
          description: Linux user to run the service as.
        group:
          type:
          - string
          - 'null'
          description: Linux group to run the service in.
        workdir:
          type:
          - string
          - 'null'
          description: Working directory.
        after:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Establishes an ordering dependency. The current unit will start only

            after the units listed in After= have started. This is useful for

            ensuring that certain services are up and running before the current

            service begins its operation.'
        requires:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Establishes a strong dependency. If the required unit fails to

            start or stops unexpectedly, the current unit will also be stopped. This

            ensures that a service critical to the functioning of the current unit

            is running and stable. Units listed in Requires= are activated along

            with the current unit. If the required unit is not active, systemd will

            attempt to start it. This directive signifies a tight coupling between

            services, where the current service cannot function without the required

            service.'
        onFailure:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Units to activate when this unit enters a failed state. This is useful

            for triggering recovery actions, notifications, or cleanup services when

            the current service fails.'
        wantedBy:
          type:
          - array
          - 'null'
          items:
            type: string
          description: 'Target used when enabling (default: multi-user.target).'
          default: multi-user.target
        enable:
          type:
          - boolean
          - 'null'
          description: 'Whether to enable this service (calls `systemctl enable <service>`).

            When enabled, the service will start automatically at boot.'
          default: true
        timeoutSec:
          type:
          - integer
          - 'null'
          format: int64
          description: Overall start/stop timeout.
          minimum: 0
        deleteAfterSuccess:
          type:
          - boolean
          - 'null'
          description: 'For oneshot: remove unit on success.'
          default: false
        remainAfterExit:
          type:
          - boolean
          - 'null'
          description: 'For oneshot: remain active after exit (default: true).

            When false, the service can be started again even if it already ran.'
          default: true
        readySignal:
          type:
          - boolean
          - 'null'
          description: Use sd_notify; maps to Type=notify.
          default: false
        watchdogSec:
          type:
          - integer
          - 'null'
          format: int64
          description: Enable systemd watchdog (seconds).
          minimum: 0
        restartPolicy:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SystemdRestartPolicy'
            description: Restart semantics (service mode).
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
