          description: 'Phase names this build plans to emit, in order, populated once at

            build open and never updated. Diffing against `build_phases.name`

            yields "what''s still pending" without polling for state changes.'
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type:
          - string
          - 'null'
