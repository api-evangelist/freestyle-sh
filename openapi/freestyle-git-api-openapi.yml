        description: Repair job ID returned by POST
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Cancel requested; current job state returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairJobView'
        '403':
          description: Repository is owned by a different account
        '404':
          description: Repository or job not found
