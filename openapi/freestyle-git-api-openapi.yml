          description: The commit message
        tree:
          $ref: '#/components/schemas/CommitTree'
          description: The ID of the tree pointed to by this commit
        parents:
          type: array
          items:
            $ref: '#/components/schemas/CommitParent'
          description: Parent commit(s) of this commit
        sha:
          type: string
          description: The commit's hash ID
    GetVisibilityResponse:
      type: object
      required:
      - visibility
      properties:
        visibility:
          $ref: '#/components/schemas/Visibility'
    DiffLineMatch:
      type: object
      description: A line that was added or changed in a diff that matched the search query.
      required:
      - line
      - lineNumber
      - startColumn
      - endColumn
      - isAddition
      properties:
        line:
          type: string
          description: The matched line content (without the leading +/- prefix).
        lineNumber:
          type: integer
          description: 1-based line number in the new file (for additions) or old file (for deletions).
          minimum: 0
        startColumn:
          type: integer
          description: 0-based byte offset of the match start within the line.
          minimum: 0
        endColumn:
          type: integer
          description: 0-based byte offset of the match end within the line.
          minimum: 0
        isAddition:
          type: boolean
          description: Whether this was an added line (true) or a deleted line (false).
    RepairJobView:
      type: object
      description: 'JSON view of a job for the GET endpoint. Status is tagged so the

        `result` and `error` fields are unambiguous to consumers.'
      required:
      - jobId
      - repoId
      - status
      - createdAt
      - progress
      properties:
        jobId:
          type: string
        repoId:
          type: string
        accountId:
          type:
          - string
          - 'null'
          description: 'Account this job is charged against for the per-account

            concurrency cap. None for admin/internal POSTs that didn''t

            supply X-Freestyle-User-Id.'
        depth:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        status:
          type: string
          description: 'One of: pending, running, completed, failed, cancelled.'
        createdAt:
          type: string
        completedAt:
          type:
          - string
          - 'null'
        progress:
          type: object
          description: 'Live counters from the walk. Updated by the worker every 500

            commits and every 10k blob lookups, plus before/after each ref.

            Always present; zeros until the walk publishes its first sample.'
        result:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/RepairResult'
            description: Populated when status == "completed".
        error:
          type:
          - string
          - 'null'
          description: Populated when status == "failed".
        verification:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/VerificationFailureView'
            description: 'Populated when verification failed after a successful rewrite

              phase. Carries the offending OID and the rewrites that were

              already persisted to the repo.'
    CreateCommitRequest:
      type: object
      required:
      - message
      - files
      properties:
        message:
          type: string
          description: The commit message
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileChange'
          description: Files to add, modify, or delete in this commit
        branch:
          type:
          - string
          - 'null'
          description: 'The branch to commit to (e.g., "main"). If not provided, commits to the default branch.

            If the branch does not exist, it is created as an orphan branch with this commit as its root.'
        author:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/CommitAuthorInfo'
            description: Optional author information (if not provided, uses default)
        expectedSha:
          type:
          - string
          - 'null'
          description: 'Optional expected parent SHA for optimistic concurrency control.

            If provided, the commit will only be created if the current branch tip (or parent) matches this SHA.

            This prevents race conditions when multiple commits are being created concurrently.

            Returns a conflict error if the check fails.'
    BranchInfo:
      type: object
      required:
      - name
      properties:
        name:
          type: string
        commit:
          type:
          - string
          - 'null'
          description: The latest commit ID on this branch. Null if the branch is empty.
    GitRepositoryTrigger:
      type: object
      required:
      - repositoryId
      - trigger
      - action
      - managed
      - id
      - createdAt
      properties:
        repositoryId:
          type: string
          format: uuid
        trigger:
          oneOf:
          - type: object
            required:
            - event
            properties:
              branches:
                type:
                - array
                - 'null'
                items:
                  type: string
              globs:
                type:
                - array
                - 'null'
                items:
                  type: string
              event:
                type: string
                enum:
                - push
        action:
          oneOf:
          - type: object
            required:
            - endpoint
            - action
            properties:
              endpoint:
                type: string
              action:
                type: string
                enum:
                - webhook
        managed:
          type: boolean
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    FilenameSearchResult:
      type: object
      required:
      - totalFiles
      - hasMore
      - files
      properties:
        totalFiles:
          type: integer
          description: Total number of matching files.
          minimum: 0
        hasMore:
          type: boolean
          description: Whether the results were truncated.
        files:
          type: array
          items:
            $ref: '#/components/schemas/FilenameEntry'
          description: The matching file paths.
    FilenameEntry:
      type: object
      required:
      - path
      - size
      properties:
        path:
          type: string
          description: The full file path relative to the repository root.
        extension:
          type:
          - string
          - 'null'
          description: The file extension (e.g. "rs", "ts"), if any.
        size:
          type: integer
          format: int64
          description: The file size in bytes.
          minimum: 0
    CommitOrder:
      type: string
      description: Sort order for commit listing
      enum:
      - desc
      - asc
    SetVisibilityResponse:
      type: object
security:
- bearerAuth: []
