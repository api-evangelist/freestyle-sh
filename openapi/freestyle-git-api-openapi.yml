  /git/v1/repo/{repo}/repair:
    get:
      tags:
      - Git
      summary: List Repair Jobs for a Repository
      description: Returns every repair job (pending, running, completed, failed, cancelled) currently in the git server's
        in-memory registry. Pod restarts on the git server clear the list.
      operationId: handle_list_repair_jobs
      parameters:
      - name: repo
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Repair jobs for the repository
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairJobList'
        '403':
          description: Repository is owned by a different account
        '404':
          description: Repository not found
    post:
      tags:
      - Git
      summary: Schedule a Repo-repair Job
      description: Spawns a background task on the git server that walks every ref's reachable history, substitutes missing
        blobs/trees with empty stand-ins, and persistently updates each ref to point at the rewritten tip. Returns immediately
        with a job ID; poll GET /git/v1/repo/{repo}/repair/{jobId} for status. Subject to a per-account concurrency cap.
      operationId: handle_schedule_repair
      parameters:
      - name: repo
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: depth
        in: query
        description: 'How far back from each ref tip to walk. Tip is depth=1.

          Omit to walk the entire history (slow on huge repos).'
        required: false
        schema:
          type:
          - integer
          - 'null'
          format: int32
          minimum: 0
        example: 1
      responses:
        '202':
          description: Repair scheduled; poll GET /repos/{repo}/repair/{jobId} for status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairAccepted'
        '403':
          description: Repository is owned by a different account
        '404':
          description: Repository not found
        '409':
          description: A repair is already in progress for this repository
        '429':
          description: Account already at the per-account concurrent-repair cap
  /git/v1/repo/{repo}/repair/{job_id}:
    get:
      tags:
      - Git
      summary: Get the Status of a Repair Job
      operationId: handle_get_repair_job
      parameters:
      - name: repo
        in: path
        description: Repository ID
        required: true
        schema:
          type: string
          format: uuid
      - name: job_id
        in: path
