  /git/v1/repo/{repo}/git/refs/tags/{tag}:
    get:
      tags:
      - Git
      summary: Get a Tag by Name
      description: "Get a tag by its name. This is the recommended endpoint for retrieving tag information.\n        Works\
        \ with both annotated tags (returns tagger, message, and target commit) and lightweight tags\n        (returns only\
        \ name and target commit). For annotated tags, the `sha` field contains the tag object's SHA,\n        while `target.sha`\
        \ contains the commit SHA. For lightweight tags, both fields contain the same commit SHA.\n\n        **Note**: If\
        \ you need to retrieve an annotated tag object by its SHA (for low-level git database operations),\n        use `/git/v1/repo/{repo}/git/tags/{hash}`\
        \ instead."
      operationId: handle_get_ref_tag
