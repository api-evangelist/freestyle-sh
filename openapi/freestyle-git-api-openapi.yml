        \       **Most users should use `/git/v1/repo/{repo}/git/refs/tags/{tag}` instead**, which works with both\n     \
        \   annotated and lightweight tags and accepts tag names rather than SHAs. This endpoint is primarily\n        for\
        \ advanced use cases that need direct access to git database objects."
      operationId: handle_get_tag
