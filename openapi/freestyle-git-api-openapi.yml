components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    CommitComparison:
      type: object
      description: Response containing the comparison between two commits
      required:
      - status
      - ahead_by
      - behind_by
      - total_commits
      - files
      properties:
        status:
          $ref: '#/components/schemas/ComparisonStatus'
          description: Status of the comparison
        ahead_by:
          type: integer
          description: Number of commits the head is ahead of base
          minimum: 0
        behind_by:
          type: integer
          description: Number of commits the head is behind base
          minimum: 0
        total_commits:
          type: integer
          description: Total number of commits in the comparison
          minimum: 0
        files:
          type: array
          items:
            $ref: '#/components/schemas/DiffFile'
          description: List of changed files
    RepositoryInfoRaw:
      type: object
      required:
      - id
      - accountId
      - visibility
      - defaultBranch
      - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type:
          - string
          - 'null'
          examples:
          - my-repo
        accountId:
          type: string
          format: uuid
        visibility:
          $ref: '#/components/schemas/Visibility'
        defaultBranch:
          type: string
        createdAt:
          type: string
          format: date-time
    GetDefaultBranchResponse:
      type: object
      required:
      - defaultBranch
