      path: /web/v1/deployment
      operations:
      - name: handle-deploy-web-v2
        method: POST
        description: Deploy a Website
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: web-v1-deployments
      path: /web/v1/deployments
      operations:
      - name: handle-list-web-deploys
        method: GET
        description: List Web Deploys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: string
          required: true
        - name: offset
          in: query
          type: string
          required: true
        - name: search
          in: query
          type: string
          required: true
