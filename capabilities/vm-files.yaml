naftiko: 1.0.0-alpha2
info:
  label: "Freestyle VMs API \u2014 Files"
  description: 'Freestyle VMs API files surface. 2 operations. Lead operation: get_file. Self-contained Naftiko capability
    for one Freestyle business surface.'
  tags:
  - Freestyle
  - VM
  - Files
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FREESTYLE_API_KEY: FREESTYLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: vm-files
    baseUri: https://api.freestyle.sh
    description: Freestyle VMs API files business capability.
    resources:
    - name: v1-vms-files
      path: /v1/vms/{vm_id}/files/{filepath}
      operations:
      - name: get-file
        method: GET
        description: get_file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vm_id
          in: path
          type: string
          required: true
        - name: filepath
          in: path
          type: string
          required: true
      - name: put-file
        method: PUT
        description: put_file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vm_id
          in: path
          type: string
          required: true
        - name: filepath
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: Authorization
      value: Bearer {{env.FREESTYLE_API_KEY}}
      placement: header
  exposes:
  - type: rest
    namespace: vm-files-rest
    port: 8080
    description: REST adapter for Freestyle VMs API files. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/vms/{vm_id}/files/{filepath}
      name: v1-vms-files
      description: REST surface for v1-vms-files.
      operations:
      - method: GET
        name: get-file
        description: get-file
        call: vm-files.get-file
        with:
          vm_id: rest.path.vm_id
          filepath: rest.path.filepath
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put-file
        description: put-file
        call: vm-files.put-file
        with:
          vm_id: rest.path.vm_id
          filepath: rest.path.filepath
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vm-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freestyle VMs API files. One tool per consumed operation.
    tools:
    - name: freestyle-get-file
      description: get-file
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vm-files.get-file
      with:
        vm_id: tools.path.vm_id
        filepath: tools.path.filepath
      outputParameters:
      - type: object
        mapping: $.
    - name: freestyle-put-file
      description: put-file
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: vm-files.put-file
      with:
        vm_id: tools.path.vm_id
        filepath: tools.path.filepath
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
