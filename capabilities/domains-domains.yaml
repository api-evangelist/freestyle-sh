naftiko: 1.0.0-alpha2
info:
  label: "Freestyle Domains API \u2014 Domains"
  description: 'Freestyle Domains API domains surface. 1 operations. Lead operation: List Domains for an Account. Self-contained
    Naftiko capability for one Freestyle business surface.'
  tags:
  - Freestyle
  - Domains
  - Domains
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FREESTYLE_API_KEY: FREESTYLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: domains-domains
    baseUri: https://api.freestyle.sh
    description: Freestyle Domains API domains business capability.
    resources:
    - name: domains-v1-domains
      path: /domains/v1/domains
      operations:
      - name: handle-list-domains
        method: GET
        description: List Domains for an Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: string
          required: false
        - name: offset
          in: query
          type: string
          required: false
        - name: implicitlyOwned
          in: query
          type: string
          required: false
    authentication:
      type: apikey
      key: Authorization
      value: Bearer {{env.FREESTYLE_API_KEY}}
      placement: header
  exposes:
  - type: rest
    namespace: domains-domains-rest
    port: 8080
    description: REST adapter for Freestyle Domains API domains. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/domains/v1/domains
      name: domains-v1-domains
      description: REST surface for domains-v1-domains.
      operations:
      - method: GET
        name: handle-list-domains
        description: List Domains for an Account
        call: domains-domains.handle-list-domains
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: domains-domains-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freestyle Domains API domains. One tool per consumed operation.
    tools:
    - name: freestyle-handle-list-domains
      description: List Domains for an Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: domains-domains.handle-list-domains
      with: {}
      outputParameters:
      - type: object
        mapping: $.
