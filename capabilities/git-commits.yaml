naftiko: 1.0.0-alpha2
info:
  label: "Freestyle Git API \u2014 Commits"
  description: 'Freestyle Git API commits surface. 3 operations. Lead operation: List Commits for a Repository. Self-contained
    Naftiko capability for one Freestyle business surface.'
  tags:
  - Freestyle
  - Git
  - Commits
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FREESTYLE_API_KEY: FREESTYLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: git-commits
    baseUri: https://api.freestyle.sh
    description: Freestyle Git API commits business capability.
    resources:
    - name: git-v1-repo-git-commits
      path: /git/v1/repo/{repo}/git/commits
      operations:
      - name: handle-list-commits
        method: GET
        description: List Commits for a Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo
          in: path
          type: string
          required: true
        - name: branch
          in: query
          type: string
          required: false
        - name: limit
          in: query
          type: string
          required: false
        - name: offset
          in: query
          type: string
          required: false
        - name: order
          in: query
          type: string
          required: false
        - name: since
          in: query
          type: string
          required: false
        - name: until
          in: query
          type: string
          required: false
        - name: disableTotalCount
          in: query
          type: string
          required: false
      - name: handle-create-odb-commit
        method: POST
        description: Create a Commit From Git Objects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: git-v1-repo-git-commits
      path: /git/v1/repo/{repo}/git/commits/{hash}
      operations:
      - name: handle-get-commit
        method: GET
        description: Get a Commit Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo
          in: path
          type: string
          required: true
        - name: hash
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: Bearer {{env.FREESTYLE_API_KEY}}
      placement: header
  exposes:
  - type: rest
    namespace: git-commits-rest
    port: 8080
    description: REST adapter for Freestyle Git API commits. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/git/v1/repo/{repo}/git/commits
      name: git-v1-repo-git-commits
      description: REST surface for git-v1-repo-git-commits.
      operations:
      - method: GET
        name: handle-list-commits
        description: List Commits for a Repository
        call: git-commits.handle-list-commits
        with:
          repo: rest.path.repo
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: handle-create-odb-commit
        description: Create a Commit From Git Objects
        call: git-commits.handle-create-odb-commit
        with:
          repo: rest.path.repo
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/git/v1/repo/{repo}/git/commits/{hash}
      name: git-v1-repo-git-commits
      description: REST surface for git-v1-repo-git-commits.
      operations:
      - method: GET
        name: handle-get-commit
        description: Get a Commit Object
        call: git-commits.handle-get-commit
        with:
          repo: rest.path.repo
          hash: rest.path.hash
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: git-commits-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freestyle Git API commits. One tool per consumed operation.
    tools:
    - name: freestyle-handle-list-commits
      description: List Commits for a Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: git-commits.handle-list-commits
      with:
        repo: tools.path.repo
      outputParameters:
      - type: object
        mapping: $.
    - name: freestyle-handle-create-odb-commit
      description: Create a Commit From Git Objects
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: git-commits.handle-create-odb-commit
      with:
        repo: tools.path.repo
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: freestyle-handle-get-commit
      description: Get a Commit Object
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: git-commits.handle-get-commit
      with:
        repo: tools.path.repo
        hash: tools.path.hash
      outputParameters:
      - type: object
        mapping: $.
