naftiko: 1.0.0-alpha2
info:
  label: "Freestyle Git API \u2014 Trees"
  description: 'Freestyle Git API trees surface. 1 operations. Lead operation: Get a Tree Object. Self-contained Naftiko capability
    for one Freestyle business surface.'
  tags:
  - Freestyle
  - Git
  - Trees
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FREESTYLE_API_KEY: FREESTYLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: git-trees
    baseUri: https://api.freestyle.sh
    description: Freestyle Git API trees business capability.
    resources:
    - name: git-v1-repo-git-trees
      path: /git/v1/repo/{repo}/git/trees/{hash}
      operations:
      - name: handle-get-tree
        method: GET
        description: Get a Tree Object
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo
          in: path
          type: string
          required: true
        - name: hash
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: Bearer {{env.FREESTYLE_API_KEY}}
      placement: header
  exposes:
  - type: rest
    namespace: git-trees-rest
    port: 8080
    description: REST adapter for Freestyle Git API trees. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/git/v1/repo/{repo}/git/trees/{hash}
      name: git-v1-repo-git-trees
      description: REST surface for git-v1-repo-git-trees.
      operations:
      - method: GET
        name: handle-get-tree
        description: Get a Tree Object
        call: git-trees.handle-get-tree
        with:
          repo: rest.path.repo
          hash: rest.path.hash
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: git-trees-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freestyle Git API trees. One tool per consumed operation.
    tools:
    - name: freestyle-handle-get-tree
      description: Get a Tree Object
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: git-trees.handle-get-tree
      with:
        repo: tools.path.repo
        hash: tools.path.hash
      outputParameters:
      - type: object
        mapping: $.
