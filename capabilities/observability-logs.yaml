naftiko: 1.0.0-alpha2
info:
  label: "Freestyle Observability API \u2014 Logs"
  description: 'Freestyle Observability API logs surface. 1 operations. Lead operation: Logs. Self-contained Naftiko capability
    for one Freestyle business surface.'
  tags:
  - Freestyle
  - Observability
  - Logs
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FREESTYLE_API_KEY: FREESTYLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: observability-logs
    baseUri: https://api.freestyle.sh
    description: Freestyle Observability API logs business capability.
    resources:
    - name: observability-v1-logs
      path: /observability/v1/logs
      operations:
      - name: handle-get-logs
        method: GET
        description: Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deploymentId
          in: query
          type: string
          required: false
        - name: requestId
          in: query
          type: string
          required: false
        - name: buildId
          in: query
          type: string
          required: false
        - name: instanceId
          in: query
          type: string
          required: false
        - name: domain
          in: query
          type: string
          required: false
        - name: vmId
          in: query
          type: string
          required: false
        - name: runId
          in: query
          type: string
          required: false
        - name: vmService
          in: query
          type: string
          required: false
        - name: pageToken
          in: query
          type: string
          required: false
        - name: pageSize
          in: query
          type: string
          required: false
        - name: startTime
          in: query
          type: string
          required: false
        - name: endTime
          in: query
          type: string
          required: false
        - name: search
          in: query
          type: string
          required: false
        - name: resourceType
          in: query
          type: string
          required: false
    authentication:
      type: apikey
      key: Authorization
      value: Bearer {{env.FREESTYLE_API_KEY}}
      placement: header
  exposes:
  - type: rest
    namespace: observability-logs-rest
    port: 8080
    description: REST adapter for Freestyle Observability API logs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/observability/v1/logs
      name: observability-v1-logs
      description: REST surface for observability-v1-logs.
      operations:
      - method: GET
        name: handle-get-logs
        description: Logs
        call: observability-logs.handle-get-logs
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: observability-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freestyle Observability API logs. One tool per consumed operation.
    tools:
    - name: freestyle-handle-get-logs
      description: Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: observability-logs.handle-get-logs
      with: {}
      outputParameters:
      - type: object
        mapping: $.
