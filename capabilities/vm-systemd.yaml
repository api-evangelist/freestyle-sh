      path: /v1/vms/{vm_id}/systemd/restart
      operations:
      - name: batch-restart-services
        method: POST
        description: batch_restart_services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vm_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-vms-systemd-services
      path: /v1/vms/{vm_id}/systemd/services
      operations:
      - name: list-services
        method: GET
        description: list_services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vm_id
          in: path
          type: string
          required: true
      - name: create-service
        method: POST
        description: create_service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vm_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: v1-vms-systemd-services
      path: /v1/vms/{vm_id}/systemd/services/{service_id}
      operations:
      - name: delete-service
        method: DELETE
        description: delete_service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vm_id
          in: path
          type: string
          required: true
        - name: service_id
          in: path
          type: string
          required: true
    - name: v1-vms-systemd-services-logs
      path: /v1/vms/{vm_id}/systemd/services/{service_id}/logs
      operations:
      - name: get-service-logs
        method: GET
        description: get_service_logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vm_id
          in: path
          type: string
          required: true
        - name: service_id
          in: path
          type: string
          required: true
        - name: lines
          in: query
          type: string
          required: false
        - name: since
          in: query
          type: string
          required: false
    - name: v1-vms-systemd-services-status
      path: /v1/vms/{vm_id}/systemd/services/{service_id}/status
      operations:
      - name: get-service-status
        method: GET
        description: get_service_status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
