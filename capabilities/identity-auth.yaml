naftiko: 1.0.0-alpha2
info:
  label: "Freestyle Identity API \u2014 Auth"
  description: 'Freestyle Identity API auth surface. 2 operations. Lead operation: Get Background Request Result. Self-contained
    Naftiko capability for one Freestyle business surface.'
  tags:
  - Freestyle
  - Identity
  - Auth
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FREESTYLE_API_KEY: FREESTYLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: identity-auth
    baseUri: https://api.freestyle.sh
    description: Freestyle Identity API auth business capability.
    resources:
    - name: auth-v1-background-requests
      path: /auth/v1/background-requests/{request_id}
      operations:
      - name: handle-get-background-request
        method: GET
        description: Get Background Request Result
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: request_id
          in: path
          type: string
          required: true
    - name: auth-v1-whoami
      path: /auth/v1/whoami
      operations:
      - name: handle-whoami
        method: GET
        description: Get Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    authentication:
      type: apikey
      key: Authorization
      value: Bearer {{env.FREESTYLE_API_KEY}}
      placement: header
  exposes:
  - type: rest
    namespace: identity-auth-rest
    port: 8080
    description: REST adapter for Freestyle Identity API auth. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/auth/v1/background-requests/{request_id}
      name: auth-v1-background-requests
      description: REST surface for auth-v1-background-requests.
      operations:
      - method: GET
        name: handle-get-background-request
        description: Get Background Request Result
        call: identity-auth.handle-get-background-request
        with:
          request_id: rest.path.request_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/v1/whoami
      name: auth-v1-whoami
      description: REST surface for auth-v1-whoami.
      operations:
      - method: GET
        name: handle-whoami
        description: Get Current User
        call: identity-auth.handle-whoami
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: identity-auth-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freestyle Identity API auth. One tool per consumed operation.
    tools:
    - name: freestyle-handle-get-background-request
      description: Get Background Request Result
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-auth.handle-get-background-request
      with:
        request_id: tools.path.request_id
      outputParameters:
      - type: object
        mapping: $.
    - name: freestyle-handle-whoami
      description: Get Current User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-auth.handle-whoami
      with: {}
      outputParameters:
      - type: object
        mapping: $.
