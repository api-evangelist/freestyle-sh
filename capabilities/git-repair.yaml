naftiko: 1.0.0-alpha2
info:
  label: "Freestyle Git API \u2014 Repair"
  description: 'Freestyle Git API repair surface. 4 operations. Lead operation: List Repair Jobs for a Repository. Self-contained
    Naftiko capability for one Freestyle business surface.'
  tags:
  - Freestyle
  - Git
  - Repair
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    FREESTYLE_API_KEY: FREESTYLE_API_KEY
capability:
  consumes:
  - type: http
    namespace: git-repair
    baseUri: https://api.freestyle.sh
    description: Freestyle Git API repair business capability.
    resources:
    - name: git-v1-repo-repair
      path: /git/v1/repo/{repo}/repair
      operations:
      - name: handle-list-repair-jobs
        method: GET
        description: List Repair Jobs for a Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo
          in: path
          type: string
          required: true
      - name: handle-schedule-repair
        method: POST
        description: Schedule a Repo-repair Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: git-v1-repo-repair
      path: /git/v1/repo/{repo}/repair/{job_id}
      operations:
      - name: handle-get-repair-job
        method: GET
        description: Get the Status of a Repair Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo
          in: path
          type: string
          required: true
        - name: job_id
          in: path
          type: string
          required: true
      - name: handle-cancel-repair-job
        method: DELETE
        description: Cancel a Running Repair Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repo
          in: path
          type: string
          required: true
        - name: job_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: Bearer {{env.FREESTYLE_API_KEY}}
      placement: header
  exposes:
  - type: rest
    namespace: git-repair-rest
    port: 8080
    description: REST adapter for Freestyle Git API repair. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/git/v1/repo/{repo}/repair
      name: git-v1-repo-repair
      description: REST surface for git-v1-repo-repair.
      operations:
      - method: GET
        name: handle-list-repair-jobs
        description: List Repair Jobs for a Repository
        call: git-repair.handle-list-repair-jobs
        with:
          repo: rest.path.repo
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: handle-schedule-repair
        description: Schedule a Repo-repair Job
        call: git-repair.handle-schedule-repair
        with:
          repo: rest.path.repo
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/git/v1/repo/{repo}/repair/{job_id}
      name: git-v1-repo-repair
      description: REST surface for git-v1-repo-repair.
      operations:
      - method: GET
        name: handle-get-repair-job
        description: Get the Status of a Repair Job
        call: git-repair.handle-get-repair-job
        with:
          repo: rest.path.repo
          job_id: rest.path.job_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: handle-cancel-repair-job
        description: Cancel a Running Repair Job
        call: git-repair.handle-cancel-repair-job
        with:
          repo: rest.path.repo
          job_id: rest.path.job_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: git-repair-mcp
    port: 9090
    transport: http
    description: MCP adapter for Freestyle Git API repair. One tool per consumed operation.
    tools:
    - name: freestyle-handle-list-repair-jobs
      description: List Repair Jobs for a Repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: git-repair.handle-list-repair-jobs
      with:
        repo: tools.path.repo
      outputParameters:
      - type: object
        mapping: $.
    - name: freestyle-handle-schedule-repair
      description: Schedule a Repo-repair Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: git-repair.handle-schedule-repair
      with:
        repo: tools.path.repo
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: freestyle-handle-get-repair-job
      description: Get the Status of a Repair Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: git-repair.handle-get-repair-job
      with:
        repo: tools.path.repo
        job_id: tools.path.job_id
      outputParameters:
      - type: object
        mapping: $.
    - name: freestyle-handle-cancel-repair-job
      description: Cancel a Running Repair Job
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: git-repair.handle-cancel-repair-job
      with:
        repo: tools.path.repo
        job_id: tools.path.job_id
      outputParameters:
      - type: object
        mapping: $.
